name: Update controls_Gemini.txt

on:
  push:
    paths:
      - '98_Gemini.pm'
  workflow_dispatch:

jobs:
  update-controls:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Update controls_Gemini.txt
        run: |
          SIZE=$(wc -c < 98_Gemini.pm)
          DATE=$(date -u +"%Y-%m-%d_%H:%M:%S")
          MD5=$(md5sum 98_Gemini.pm | awk '{print $1}')
          echo "UPD ${DATE} ${SIZE} ${MD5} FHEM/98_Gemini.pm" > controls_Gemini.txt

      - name: Commit updated controls_Gemini.txt
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add controls_Gemini.txt
          git diff --cached --quiet || git commit -m "Auto-update controls_Gemini.txt"
          git push
